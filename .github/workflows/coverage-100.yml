name: Coverage 100

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage-100:
    name: Coverage 100 Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run Gradle coverage
        run: |
          chmod +x gradlew || true
          ./gradlew test jacocoTestReport

      - name: Enforce 100% coverage
        run: |
          python3 scripts/quality/assert_coverage_100.py \
            --xml "java=app/build/reports/jacoco/test/jacocoTestReport.xml" \
            --out-json "coverage-100/coverage.json" \
            --out-md "coverage-100/coverage.md"
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-100
          path: |
            coverage
            **/coverage
            **/TestResults
