# Lean quality gates -- LOCAL auto-fixers + fast checks (charter 2026-06-16).
# Install with `pre-commit install`; run on demand with `pre-commit run --all-files`.
# NOTE: the CI `quality` gate (reusable-quality.yml) is self-contained and runs its
# OWN pinned CLIs -- it does NOT execute this file. These hooks are a developer
# convenience that mirrors the gate's intent locally. Every rev is pinned.
#
# This repo's APPLICATION is pure Java/Android and currently contains no Python, so
# the Ruff hooks below (scoped to app/*.py) are inert until application Python is
# added. The gitleaks hook scans for committed secrets. Java auto-formatting
# (Spotless) is wired into Gradle, not pre-commit.
minimum_pre_commit_version: "3.5.0"

default_language_version:
  python: python3

exclude: |-
  (?x)^(
    scripts/|
    node_modules/|
    build/|
    out/|
    dist/|
    vendor/|
    \.venv/|
    gradle/wrapper/|
    .*\.egg-info/
  )

repos:
  # --- Gate 1: Python lint + format (ruff), scoped to application code (app/) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        name: ruff (lint --fix)
        args: ["--fix"]
        files: '^app/.*\.py$'
      - id: ruff-format
        name: ruff (format)
        files: '^app/.*\.py$'

  # --- Gate 5: secrets (gitleaks) over the working tree, must report 0 ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secrets)
        args: ["--config", ".gitleaks.toml"]
